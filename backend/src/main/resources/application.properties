# Server configuration
server.port=8081

# Database Configuration (MySQL)
spring.datasource.url=jdbc:mysql://localhost:3306/placement_platform?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate Configuration
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Custom JWT configuration
application.security.jwt.secret-key=${JWT_SECRET}
# Token validity: 24 hours (in milliseconds)
application.security.jwt.expiration=86400000

# Resume Upload Configuration
application.resume.upload-dir=uploads/resumes
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# Gemini API Configuration
gemini.api.key=${GEMINI_API_KEY}
gemini.model=gemini-2.5-flash

# Cooldown configurations for interview module
application.interview.cooldown-hours=12
application.interview.learning.global-ratio=60
application.interview.learning.personalized-ratio=40
application.interview.default-total-questions=5
application.interview.learning.questions=10
application.interview.mock.questions=15

# Dashboard Configuration
application.dashboard.health.resume-days=30
application.dashboard.health.interview-days=30
application.dashboard.health.profile-days=60
application.dashboard.ats.threshold=80

# Readiness Weights (Must sum to 100)
application.dashboard.readiness.resume-weight=30
application.dashboard.readiness.interview-weight=35
application.dashboard.readiness.profile-weight=15
application.dashboard.readiness.skills-weight=10
application.dashboard.readiness.company-weight=10

# Job Synchronization Framework Configuration
application.jobs.sync.enabled=true
application.jobs.static.path=jobs/jobs.json
application.jobs.archive.days=90

# Job Matching Strategy Weights (Must sum to 100)
application.jobs.matching.weight.skills=35
application.jobs.matching.weight.role=20
application.jobs.matching.weight.eligibility=15
application.jobs.matching.weight.resume=10
application.jobs.matching.weight.experience=10
application.jobs.matching.weight.education=5
application.jobs.matching.weight.location=5



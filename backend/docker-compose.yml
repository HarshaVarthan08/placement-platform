version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: placement_mysql
    restart: always
    environment:
      MYSQL_DATABASE: placement_platform
      MYSQL_ROOT_PASSWORD: rootpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - placement_network

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: placement_app
    restart: always
    ports:
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:mysql://db:3306/placement_platform?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - DB_USERNAME=root
      - DB_PASSWORD=rootpassword
      - JWT_SECRET=production_secret_key_should_be_long_enough_and_secure_for_production_environments_jwt_validation
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - app_uploads:/app/uploads
    networks:
      - placement_network

volumes:
  mysql_data:
    name: placement_mysql_data
  app_uploads:
    name: placement_app_uploads

networks:
  placement_network:
    name: placement_network
